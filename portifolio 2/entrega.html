<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Entrega - Minha Loja Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color:#1f2937; }
    header { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #312e81 100%); color:#fff; padding:24px; text-align:center; box-shadow:0 8px 32px rgba(30,64,175,.3); }
    header h1 { font-size:1.8rem; font-weight:700; }
    nav { background:#f9fafb; padding:16px; border-top:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb; }
    .nav-wrap { max-width:1100px; margin:0 auto; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    .nav-link { display:inline-flex; align-items:center; gap:10px; padding:12px 16px; background:#fff; color:#1f2937; border:1px solid #e5e7eb; border-radius:6px; text-decoration:none; font-weight:600; font-size:.975rem; }
    .nav-link .icon { font-size:1.1rem; }
    .nav-link.active, .nav-link[aria-current="page"] { background:#1e40af; color:#fff; border-color:#1e40af; box-shadow:0 0 0 1px #1e40af inset; }
    main { max-width:900px; margin:40px auto; padding:24px; background:#ffffffea; border:1px solid #e5e7eb; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.06); text-align:center; }
    h2 { font-size:2.2rem; margin-bottom:10px; background:linear-gradient(135deg, #1e40af, #059669); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    p { color:#6b7280; font-size:1.1rem; }
  </style>
</head>
<body>
  <header><h1>Minha Loja Online</h1></header>

  <nav aria-label="Menu principal">
    <div class="nav-wrap">
      <a class="nav-link" href="produtos.html" target="_parent"><span class="icon" aria-hidden="true">🚚</span><span>Produtos</span></a>
      <a class="nav-link" href="pagamento.html" target="_parent"><span class="icon" aria-hidden="true">🚚</span><span>Pagamento</span></a>
      <a class="nav-link" href="entrega.html" target="_parent"><span class="icon" aria-hidden="true">🚚</span><span>Entrega</span></a>
      <a class="nav-link" href="contato.html" target="_parent"><span class="icon" aria-hidden="true">🚚</span><span>Contato</span></a>
    </div>
  </nav>

  <main>
    <h2>Olá, mundo!</h2>
    <p>Você está na página de Entrega.</p>
  </main>

  <script>
    (function setActiveNav() {
      const path = (window.location.pathname || '').split('/').pop();
      document.querySelectorAll('.nav-link').forEach(a => {
        const href = a.getAttribute('href');
        if (href === path) {
          a.classList.add('active');
          a.setAttribute('aria-current', 'page');
        }
      });
    })();
  </script>
</body>
</html>
