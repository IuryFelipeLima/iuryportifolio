<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Produto - Minha Loja Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #312e81 100%);
      color: #fff;
      padding: 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(30, 64, 175, 0.3);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
    }

    /* Topbar (reaproveitada) */
    .topbar {
      position: sticky;
      top: 72px;
      z-index: 999;
      background: #ffffffcc;
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #e5e7eb;
    }

    .topbar-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }

    .topbar-left, .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-icon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .top-icon:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .top-icon .icon {
      font-size: 1.1rem;
    }

    .search-form {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 6px 8px;
      width: min(620px, 100%);
    }

    .search-form input {
      flex: 1;
      border: none;
      outline: none;
      padding: 8px 10px;
      font-size: 0.95rem;
      background: transparent;
    }

    .search-form button {
      border: none;
      background: #1e40af;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffffee;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 40px 28px;
      text-align: center;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 2.2rem;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1e40af, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #6b7280;
      font-size: 1.05rem;
      margin-bottom: 20px;
    }

    .btn-back {
      display: inline-block;
      padding: 12px 20px;
      background: #1e40af;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .btn-back:hover {
      background: #1e3a8a;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      from { 
        filter: drop-shadow(0 0 10px rgba(30, 64, 175, 0.3));
      }
      to { 
        filter: drop-shadow(0 0 20px rgba(30, 64, 175, 0.5));
      }
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .topbar-wrap {
        grid-template-columns: 1fr;
      }
      
      .topbar-left, .topbar-right {
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .container {
        padding: 40px 30px;
      }
      
      h2 {
        font-size: 2rem;
      }
      
      p {
        font-size: 0.95rem;
      }
      
      .btn-back {
        padding: 12px 25px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        width: 95%;
      }
      
      h2 {
        font-size: 1.8rem;
      }
      
      p {
        font-size: 0.85rem;
      }
      
      .btn-back {
        padding: 10px 20px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header><h1>Minha Loja Online</h1></header>

  <div class="topbar" role="navigation" aria-label="Barra superior">
    <div class="topbar-wrap">
      <div class="topbar-left">
        <a class="top-icon" href="index.html" target="_parent" aria-label="Início"><span class="icon">🏠</span><span>Início</span></a>
        <a class="top-icon" href="categorias.html" target="_parent" aria-label="Categorias"><span class="icon">🗂️</span><span>Categorias</span></a>
      </div>
      <div class="topbar-center">
        <form class="search-form" role="search" action="pesquisa.html" method="get" target="_parent">
          <input type="search" name="q" placeholder="Buscar produtos, marcas..." aria-label="Buscar" />
          <button type="submit" aria-label="Pesquisar">🔍</button>
        </form>
      </div>
      <div class="topbar-right">
        <a class="top-icon" href="localizacao.html" target="_parent" aria-label="Localização"><span class="icon">📍</span><span>Localização</span></a>
        <a class="top-icon" href="favoritos.html" target="_parent" aria-label="Favoritos"><span class="icon">❤️</span><span>Favoritos</span></a>
        <a class="top-icon" href="carrinho.html" target="_parent" aria-label="Carrinho"><span class="icon">🛒</span><span>Carrinho</span></a>
        <a class="top-icon" href="conta.html" target="_parent" aria-label="Conta"><span class="icon">👤</span><span>Conta</span></a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="emoji">👋</div>
    <h2>Olá, mundo!</h2>
    <p>Bem-vindo à página do produto. Em breve você verá todos os detalhes do item escolhido.</p>
    <a class="btn-back" href="index.html" target="_parent">← Voltar para a Loja</a>
  </div>
</body>
</html>
